worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker internal DNS resolver for runtime service discovery
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ─── Gzip Compression ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ─── Rate Limiting ───
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # ═══════════════════════════════════════════
    #  UPSTREAM BACKENDS
    # ═══════════════════════════════════════════

    upstream product_catalog {
        server product-catalog:3001;
    }

    upstream product_inventory {
        server product-inventory:3002;
    }

    upstream order_management {
        server order-management:3003;
    }

    upstream profile_management {
        server profile-management:3004;
    }

    upstream shipping_handling {
        server shipping-handling:3005;
    }

    upstream contact_support {
        server contact-support:3006;
    }

    upstream ecommerce_ui {
        server ecommerce-ui:80;
    }

    # ═══════════════════════════════════════════
    #  SERVER
    # ═══════════════════════════════════════════

    server {
        listen 80;
        server_name localhost;

        # ─── Health Check ───
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ─── Product Catalog API ───
        location /api/products {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://product_catalog;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ─── Product Inventory API ───
        location /api/inventory {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://product_inventory;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ─── Order Management API ───
        location /api/orders {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://order_management;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ─── Profile Management API ───
        location /api/profiles/login {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://profile_management;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/profiles {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://profile_management;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ─── Shipping & Handling API ───
        location /api/shipping {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://shipping_handling;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ─── Contact Support API ───
        location /api/support {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://contact_support;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ─── Frontend (catch-all) ───
        location / {
            proxy_pass http://ecommerce_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Frontend SPA fallback ───
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://ecommerce_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_valid 200 1d;
        }
    }
}
